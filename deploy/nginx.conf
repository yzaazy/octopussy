# Serves the built site and accepts PUT for the shared progress file.
# Mount this file at /etc/nginx/conf.d/default.conf in the nginx:alpine container.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /progress.json {
        dav_methods PUT;
        create_full_put_path on;
        client_max_body_size 1m;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
